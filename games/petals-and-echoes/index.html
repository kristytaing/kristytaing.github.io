<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🌸 Petals & Echoes v2</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:#0d0810;display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;font-family:Georgia,serif;}
    h1{color:#f5c9d8;font-size:1rem;letter-spacing:3px;margin-bottom:8px;opacity:0.85;}
    canvas{border-radius:14px;box-shadow:0 0 80px rgba(200,120,180,0.3);cursor:none;}
    #controls{color:#9a7888;font-size:0.65rem;margin-top:8px;letter-spacing:1px;text-align:center;line-height:1.8;}
  </style>
</head>
<body>
<h1>✦ PETALS & ECHOES ✦</h1>
<canvas id="game" width="900" height="560"></canvas>
<div id="controls">
  WASD / ARROWS move &nbsp;·&nbsp; E interact &nbsp;·&nbsp; C combine petals &nbsp;·&nbsp; TAB shadow world &nbsp;·&nbsp; SPACE place combination &nbsp;·&nbsp; R rest at stone (advance time)
</div>
<script>
const canvas=document.getElementById('game');
const dpr=window.devicePixelRatio||1;
const W=900,H=560;
canvas.width=W*dpr;canvas.height=H*dpr;
canvas.style.width=W+'px';canvas.style.height=H+'px';
const ctx=canvas.getContext('2d');
ctx.scale(dpr,dpr);

// ═══════════════ STATE ═══════════════
const G={
  t:0, dt:0, lastT:0,
  dayT:40,        // start at mid-day (0=dawn,60=day,120=dusk,180=night,240=cycle)
  silenceMeter:0.75, // 0=restored,1=silent
  shadowWorld:false,
  shadowBloomActive:false,
  shadowBloomTimer:0,
  windMood:'curious',
  windAngle:0.4,
  windStrength:1.0,
  windMoodTimer:45,
  memoriesFound:0,
  memoriesTotal:5,
  puzzlesSolved:0,
  zonesRestored:0,
  won:false,
  showCombineUI:false,
  combineSlots:[null,null],
  combineSelected:0,
  pendingResult:null,
  lastNotice:'',
  noticeTimer:0,
  memoryScene:null,
  memoryTimer:0,
  nearStone:null,
  nearMarker:null,
  nearFragment:null,
  showTutorial:true,
  tutorialPage:0,
};

// ═══════════════ PETAL TYPES ═══════════════
const PT={
  cherry:{name:'Cherry',icon:'🌸',col:'#f7b8c8',dark:'#c47898',label:'C'},
  moss:  {name:'Moss',  icon:'🍃',col:'#b8d8a0',dark:'#6a9850',label:'M'},
  dew:   {name:'Dew',   icon:'💧',col:'#a8d4f0',dark:'#4888b8',label:'D'},
  moon:  {name:'Moon',  icon:'🌙',col:'#d8c4f8',dark:'#7850c0',label:'N'},
};

const RECIPES=[
  {a:'cherry',b:'moss',  r:'rootBridge', name:'Root Bridge', icon:'🌿',col:'#90c870',desc:'Grows a living path across a gap'},
  {a:'cherry',b:'dew',   r:'rainEcho',   name:'Rain Echo',   icon:'🌧',col:'#70b0e0',desc:'Fills a dry pond — enables reflections'},
  {a:'moss',  b:'moon',  r:'shadowBloom',name:'Shadow Bloom',icon:'✨',col:'#c0a0f0',desc:'Reveals the shadow world for 30s'},
  {a:'dew',   b:'moon',  r:'windLens',   name:'Wind Lens',   icon:'🌀',col:'#a0d8f0',desc:'Bends gusts to new angles'},
];
function findRecipe(a,b){return RECIPES.find(r=>(r.a===a&&r.b===b)||(r.a===b&&r.b===a));}

const WIND_MOODS={
  curious:{col:'#90e090',pcol:'#c0f0c0',spd:1.3,desc:'Curious · swirls around you',angle_delta:0.02},
  playful:{col:'#f0e060',pcol:'#fff0a0',spd:1.9,desc:'Playful · bouncy & fast',   angle_delta:0.05},
  sad:    {col:'#90b8e0',pcol:'#c0d8f0',spd:0.5,desc:'Sad · slow & straight',     angle_delta:0.003},
};

// ═══════════════ PLAYER ═══════════════
const PL={
  x:W*0.5,y:H*0.62,spd:2.4,
  inv:[],maxInv:8,
  combinations:[],
  facing:1,walkT:0,moving:false,
};

// ═══════════════ WORLD OBJECTS ═══════════════
const ponds=[
  {x:W*0.18,y:H*0.56,rx:58,ry:29,dry:true, restored:false,id:'pw'},
  {x:W*0.72,y:H*0.49,rx:68,ry:34,dry:false,restored:true, id:'pe'},
];
const markers=[
  {x:W*0.30,y:H*0.53,tier:'bloom',solved:false,need:'cherry',    col:'#f7b8c8',lbl:'✿',shadow:false},
  {x:W*0.63,y:H*0.44,tier:'bloom',solved:false,need:'dew',       col:'#a8d4f0',lbl:'✿',shadow:false},
  {x:W*0.44,y:H*0.36,tier:'weave',solved:false,need:'rainEcho',  col:'#d0e890',lbl:'⧖',shadow:false},
  {x:W*0.80,y:H*0.60,tier:'weave',solved:false,need:'rootBridge',col:'#b8e0a8',lbl:'⧖',shadow:false},
  {x:W*0.35,y:H*0.73,tier:'echo', solved:false,need:'shadowBloom',col:'#d4c0f0',lbl:'◈',shadow:true },
  {x:W*0.57,y:H*0.27,tier:'echo', solved:false,need:'windLens',  col:'#a8d0f0',lbl:'◈',shadow:false},
];
const memFragments=[
  {x:W*0.22,y:H*0.47,collected:false,scene:'A girl planting the first tree',col:'#f7e0b0'},
  {x:W*0.70,y:H*0.41,collected:false,scene:'Wind teaching petals to dance',col:'#d0f0c0'},
  {x:W*0.50,y:H*0.29,collected:false,scene:'The ponds remembering the sky',col:'#c0dff8'},
  {x:W*0.14,y:H*0.64,collected:false,scene:'Stone circles humming with song',col:'#e8c8f8'},
  {x:W*0.82,y:H*0.54,collected:false,scene:'The last path before silence fell',col:'#f8e0e0'},
];
const windStones=[
  {x:W*0.38,y:H*0.59,learned:false,dir:-0.5, glow:0},
  {x:W*0.60,y:H*0.51,learned:false,dir:1.2,  glow:0},
  {x:W*0.24,y:H*0.37,learned:false,dir:2.8,  glow:0},
];
const trees=[
  {x:W*0.10,y:H*0.44,sc:1.1,phase:0  },
  {x:W*0.84,y:H*0.38,sc:0.9,phase:1.2},
  {x:W*0.52,y:H*0.28,sc:0.75,phase:2.1},
  {x:W*0.30,y:H*0.32,sc:0.6,phase:3.0},
];
/* falling world petals */
const wPetals=Array.from({length:35},()=>mkWorldPetal());
function mkWorldPetal(night=false){
  const nk=Object.keys(PT);
  return{x:Math.random()*W,y:-20+Math.random()*H,
    vx:(Math.random()-0.5)*0.5,vy:0.35+Math.random()*0.55,
    rot:Math.random()*Math.PI*2,rotV:(Math.random()-0.5)*0.05,
    sz:3.5+Math.random()*5,type:nk[Math.floor(Math.random()*4)],
    op:0.45+Math.random()*0.5,collectible:Math.random()<0.28,age:Math.random()*80};
}
/* wind particles */
const wndPtcl=Array.from({length:30},()=>mkWndP());
function mkWndP(){return{x:Math.random()*W,y:Math.random()*H,life:Math.random(),spd:0.5+Math.random()*1.5,sz:1.5+Math.random()*2.5,off:Math.random()*Math.PI*2};}
let pops=[];
function addPop(x,y,text,col){pops.push({x,y,text,col,p:0});}
function notice(msg){G.lastNotice=msg;G.noticeTimer=3;}

// ═══════════════ HELPERS ═══════════════
const Theme={
  roundRect(x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();},
};
function dist(ax,ay,bx,by){return Math.sqrt((ax-bx)**2+(ay-by)**2);}
function lerp(a,b,t){return a+(b-a)*t;}
function lerpCol(a,b,t){
  const p=s=>parseInt(s,16);
  const r1=p(a.slice(1,3)),g1=p(a.slice(3,5)),b1=p(a.slice(5,7));
  const r2=p(b.slice(1,3)),g2=p(b.slice(3,5)),b2=p(b.slice(5,7));
  const r=Math.round(r1+(r2-r1)*t),g=Math.round(g1+(g2-g1)*t),bv=Math.round(b1+(b2-b1)*t);
  return '#'+[r,g,bv].map(v=>v.toString(16).padStart(2,'0')).join('');
}

// ═══════════════ DAY/NIGHT CYCLE ═══════════════
function dayPhase(){// 0=dawn,1=day,2=dusk,3=night
  const d=G.dayT%240;
  if(d<60)return{p:'dawn',f:d/60};
  if(d<120)return{p:'day',f:(d-60)/60};
  if(d<180)return{p:'dusk',f:(d-120)/60};
  return{p:'night',f:(d-180)/60};
}
function drawSky(){
  const{p,f}=dayPhase();
  let tops,bots;
  if(p==='dawn'){tops=[lerpCol('#1a0a18','#e8a080',f),lerpCol('#0a1020','#f8d090',f)];bots=[lerpCol('#2a1028','#f0c098',f),lerpCol('#1a0818','#f8e0c0',f)];}
  else if(p==='day'){tops=[lerpCol('#e8a080','#d8e8f0',f),lerpCol('#f8d090','#b8d8f0',f)];bots=[lerpCol('#f0c098','#c8d8e8',f),lerpCol('#f8e0c0','#d0e8f8',f)];}
  else if(p==='dusk'){tops=[lerpCol('#d8e8f0','#1a0820',f),lerpCol('#b8d8f0','#3a1840',f)];bots=[lerpCol('#c8d8e8','#e08060',f),lerpCol('#d0e8f8','#f0a080',f)];}
  else{tops=['#0c0618','#180c28'];bots=['#160828','#1c1030'];}
  const g=ctx.createLinearGradient(0,0,0,H*0.6);
  g.addColorStop(0,tops[0]);g.addColorStop(0.5,tops[1]);
  g.addColorStop(0.8,bots[0]);g.addColorStop(1,bots[1]);
  ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
  // Stars at night/dusk
  if(p==='night'||p==='dusk'){
    const sa=p==='night'?1:f*0.8;
    ctx.globalAlpha=sa;ctx.fillStyle='#fff';
    for(let i=0;i<60;i++){const sx=(i*137+11)%W,sy=(i*97+7)%(H*0.5);const st=Math.sin(G.t*0.5+i)*0.5+0.5;ctx.globalAlpha=sa*st*0.8;ctx.beginPath();ctx.arc(sx,sy,0.8,0,Math.PI*2);ctx.fill();}
    ctx.globalAlpha=1;
  }
  // Moon
  if(p==='night'||p==='dusk'){
    const ma=p==='night'?0.9:f*0.6;
    ctx.globalAlpha=ma;
    const mg=ctx.createRadialGradient(W*0.85,H*0.12,0,W*0.85,H*0.12,22);
    mg.addColorStop(0,'#f8f0e0');mg.addColorStop(0.6,'#e8d8c0');mg.addColorStop(1,'rgba(240,220,180,0)');
    ctx.fillStyle=mg;ctx.beginPath();ctx.arc(W*0.85,H*0.12,22,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
}

// ═══════════════ WORLD RENDER ═══════════════
function drawWorld(){
  const sw=G.shadowWorld||(G.shadowBloomActive);
  const isNight=dayPhase().p==='night';

  // ── Back hill (distant, desaturated) ──
  let g;
  if(sw){
    ctx.fillStyle='#1c1030';
  } else if(isNight){
    ctx.fillStyle='#141c0c';
  } else {
    g=ctx.createLinearGradient(0,H*0.28,0,H*0.55);
    g.addColorStop(0,'#e8d8c0');g.addColorStop(1,'#d4c8a8');
    ctx.fillStyle=g;
  }
  ctx.beginPath();ctx.moveTo(0,H*0.42);
  ctx.bezierCurveTo(W*0.15,H*0.28,W*0.38,H*0.44,W*0.58,H*0.32);
  ctx.bezierCurveTo(W*0.74,H*0.22,W*0.9,H*0.34,W,H*0.40);
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();

  // ── Mid hill ──
  if(sw){g=ctx.createLinearGradient(0,H*0.42,0,H);g.addColorStop(0,'#241838');g.addColorStop(1,'#140c28');}
  else if(isNight){g=ctx.createLinearGradient(0,H*0.42,0,H);g.addColorStop(0,'#182010');g.addColorStop(1,'#0e1408');}
  else{g=ctx.createLinearGradient(0,H*0.42,0,H);g.addColorStop(0,'#b8d898');g.addColorStop(0.5,'#a8cc88');g.addColorStop(1,'#90b870');}
  ctx.fillStyle=g;
  ctx.beginPath();ctx.moveTo(0,H*0.54);
  ctx.bezierCurveTo(W*0.18,H*0.44,W*0.42,H*0.60,W*0.68,H*0.46);
  ctx.bezierCurveTo(W*0.84,H*0.38,W*0.93,H*0.50,W,H*0.54);
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();

  // ── Foreground ground (brightest, closest) ──
  if(sw){g=ctx.createLinearGradient(0,H*0.62,0,H);g.addColorStop(0,'#2c2048');g.addColorStop(1,'#1a1030');}
  else if(isNight){g=ctx.createLinearGradient(0,H*0.62,0,H);g.addColorStop(0,'#1e2814');g.addColorStop(1,'#0e160a');}
  else{g=ctx.createLinearGradient(0,H*0.62,0,H);g.addColorStop(0,'#c8e0a8');g.addColorStop(0.4,'#b0d090');g.addColorStop(1,'#98c078');}
  ctx.fillStyle=g;
  ctx.beginPath();ctx.moveTo(0,H*0.64);
  ctx.bezierCurveTo(W*0.22,H*0.56,W*0.48,H*0.70,W*0.76,H*0.58);
  ctx.bezierCurveTo(W*0.88,H*0.54,W*0.96,H*0.60,W,H*0.62);
  ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();

  // ── Grass texture dots (subtle) ──
  if(!sw&&!isNight){
    ctx.globalAlpha=0.18;
    for(let i=0;i<40;i++){
      const gx=(i*173+31)%W, gy=H*0.66+(i*97+13)%(H*0.3);
      ctx.fillStyle=i%2?'#80b058':'#a8cc80';
      ctx.beginPath();ctx.ellipse(gx,gy,2.5,1.2,0,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }

  // ── Silence overlay ──
  if(G.silenceMeter>0.3){
    ctx.globalAlpha=G.silenceMeter*0.28;
    const sg=ctx.createLinearGradient(0,0,W,H);
    sg.addColorStop(0,'#f0ece8');sg.addColorStop(1,'#dcd8d4');
    ctx.fillStyle=sg;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;
  }

  // ── Winding dirt path (wider, warmer, two-tone) ──
  const pathCol=sw?'#2c1848':isNight?'#28200e':'#d4b888';
  const pathHi =sw?'#3c2860':isNight?'#1c1608':'#ecdcaa';
  ctx.lineCap='round';ctx.lineJoin='round';
  // Shadow/base
  ctx.strokeStyle=pathCol;ctx.lineWidth=34;
  ctx.beginPath();ctx.moveTo(W*0.5,H+10);
  ctx.bezierCurveTo(W*0.5,H*0.80,W*0.38,H*0.66,W*0.34,H*0.52);
  ctx.bezierCurveTo(W*0.30,H*0.42,W*0.44,H*0.34,W*0.5,H*0.28);ctx.stroke();
  // Centre highlight
  ctx.strokeStyle=pathHi;ctx.lineWidth=16;
  ctx.beginPath();ctx.moveTo(W*0.5,H+10);
  ctx.bezierCurveTo(W*0.5,H*0.80,W*0.38,H*0.66,W*0.34,H*0.52);
  ctx.bezierCurveTo(W*0.30,H*0.42,W*0.44,H*0.34,W*0.5,H*0.28);ctx.stroke();
  // Edge detail pebbles
  if(!sw&&!isNight){
    ctx.globalAlpha=0.25;
    for(let i=0;i<8;i++){
      const t2=i/7;
      const bx=W*(0.5+0.04*Math.sin(i*1.3))-18,by=H*(0.72-t2*0.44);
      ctx.fillStyle='#c4a870';ctx.beginPath();ctx.ellipse(bx,by,3,2,0.3,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }
}

function drawPonds(){
  ponds.forEach(pond=>{
    const{x,y,rx,ry,dry}=pond;
    if(dry){
      ctx.fillStyle=G.shadowWorld?'#241830':'#b8a898';
      ctx.beginPath();ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='#a09080';ctx.lineWidth=1.5;ctx.setLineDash([4,4]);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle='rgba(160,140,120,0.5)';ctx.font='11px Georgia';ctx.textAlign='center';ctx.fillText('dry',x,y+4);
    }else{
      const pc=ctx.createRadialGradient(x,y,0,x,y,rx);
      if(G.shadowWorld){pc.addColorStop(0,'rgba(80,40,160,0.9)');pc.addColorStop(0.7,'rgba(60,20,120,0.7)');pc.addColorStop(1,'rgba(40,10,80,0.2)');}
      else{pc.addColorStop(0,'rgba(160,210,240,0.88)');pc.addColorStop(0.6,'rgba(140,195,230,0.72)');pc.addColorStop(1,'rgba(120,180,220,0.25)');}
      ctx.fillStyle=pc;ctx.beginPath();ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2);ctx.fill();
      // Shimmer
      ctx.strokeStyle=G.shadowWorld?'rgba(160,100,255,0.3)':'rgba(255,255,255,0.3)';ctx.lineWidth=1.5;
      for(let i=0;i<3;i++){const ox=Math.sin(G.t*0.9+i*1.3)*7;ctx.beginPath();ctx.moveTo(x-rx*0.4+ox,y-4+i*6);ctx.lineTo(x+rx*0.3+ox,y-4+i*6);ctx.stroke();}
      ctx.strokeStyle=G.shadowWorld?'rgba(120,60,200,0.5)':'rgba(140,185,220,0.5)';ctx.lineWidth=2;ctx.beginPath();ctx.ellipse(x,y,rx,ry,0,0,Math.PI*2);ctx.stroke();
      // Reflection hint
      if(!G.shadowWorld){ctx.globalAlpha=0.18;ctx.fillStyle='#c0a0e8';ctx.beginPath();ctx.ellipse(x,y+ry*0.4,rx*0.6,ry*0.4,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
    }
  });
}

function drawTree(x,y,sc,phase){
  const isNight=dayPhase().p==='night';
  const sw=G.shadowWorld;
  const sway=Math.sin(G.t*0.5+phase)*2.5*sc*(WIND_MOODS[G.windMood].spd);

  // Trunk: rounded, tapered
  const trunkCol=sw?'#3a2050':isNight?'#2a1e0e':'#7a5030';
  const trunkHi =sw?'#5030708':'#b08050';
  let tg=ctx.createLinearGradient(x-6*sc,0,x+6*sc,0);
  tg.addColorStop(0,trunkCol);tg.addColorStop(0.4,isNight||sw?trunkCol:'#9a6840');tg.addColorStop(1,trunkCol);
  ctx.fillStyle=tg;
  ctx.beginPath();
  ctx.moveTo(x-5*sc+sway*0.2,y+32*sc);
  ctx.bezierCurveTo(x-5*sc,y+20*sc,x-3*sc+sway*0.1,y+5*sc,x+sway*0.3,y);
  ctx.bezierCurveTo(x+3*sc+sway*0.1,y+5*sc,x+5*sc,y+20*sc,x+5*sc+sway*0.2,y+32*sc);
  ctx.closePath();ctx.fill();
  // Trunk root flare
  ctx.fillStyle=trunkCol;
  ctx.beginPath();ctx.ellipse(x+sway*0.3,y+32*sc,8*sc,3*sc,0,0,Math.PI*2);ctx.fill();

  // Canopy layers — 3 fluffy overlapping puffs like the mock
  const canopyLayers=sw
    ?[['#2c1848',40],['#3c2060',34],['#4a2870',28]]
    :isNight
    ?[['#1a2810',40],['#243818',34],['#1e3010',28]]
    :[['#e0c870',42],['#ecd888',36],['#f4e8a0',30]];

  canopyLayers.forEach(([col,r],i)=>{
    // Each layer slightly offset for organic look
    const ox=sway*(0.2+i*0.08);
    const oy=-i*14*sc;
    let cg=ctx.createRadialGradient(x+ox-4*sc,y+oy-r*sc*0.3,1,x+ox,y+oy,r*sc);
    const lighterCol=col.replace(/[0-9a-f]{2}/gi,hex=>Math.min(255,parseInt(hex,16)+30).toString(16).padStart(2,'0'));
    cg.addColorStop(0,lighterCol);cg.addColorStop(0.6,col);cg.addColorStop(1,col+'cc');
    ctx.fillStyle=cg;
    // Multiple overlapping circles for puffy look
    for(let j=0;j<3;j++){
      const jx=ox+Math.cos(j*2.1+phase)*r*sc*0.28;
      const jy=oy+Math.sin(j*2.1+phase)*r*sc*0.18-j*4*sc;
      ctx.beginPath();ctx.arc(x+jx,y+jy,r*sc*(0.78-j*0.06),0,Math.PI*2);ctx.fill();
    }
  });

  // Blossom dots scattered in canopy
  const blossomCol=sw?'rgba(160,80,255,0.5)':isNight?'rgba(200,160,255,0.3)':'rgba(255,190,215,0.75)';
  ctx.fillStyle=blossomCol;
  for(let i=0;i<10;i++){
    const a=i/10*Math.PI*2+G.t*0.15+phase;
    const br=(16+i*2)*sc;
    const bx=x+Math.cos(a)*br+sway;
    const by=y-18*sc+Math.sin(a)*br*0.55;
    ctx.beginPath();ctx.arc(bx,by,3.5*sc,0,Math.PI*2);ctx.fill();
  }
  // Canopy rim highlight
  if(!sw&&!isNight){
    ctx.globalAlpha=0.22;ctx.fillStyle='#fffbe8';
    ctx.beginPath();ctx.ellipse(x+sway*0.3-6*sc,y-28*sc,18*sc,8*sc,-0.3,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }
}

function drawWindStones(){
  windStones.forEach(s=>{
    s.glow=s.learned?0.5+Math.sin(G.t*2+s.dir)*0.5:0;
    const learned=s.learned;
    const pulse=learned?0.5+0.5*Math.sin(G.t*2.5+s.dir):0;
    const near=dist(PL.x,PL.y,s.x,s.y)<55;

    // Outer glow halo
    if(learned||near){
      const glowR=learned?40:28;
      const glowA=learned?0.28+0.18*pulse:0.14;
      const grd=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,glowR);
      grd.addColorStop(0,learned?'rgba(180,130,255,'+glowA+')':'rgba(255,220,100,0.18)');
      grd.addColorStop(1,'transparent');
      ctx.fillStyle=grd;ctx.beginPath();ctx.arc(s.x,s.y,glowR,0,Math.PI*2);ctx.fill();
    }

    // Stone base (mossy rock)
    const stoneCol=G.shadowWorld?'#3a2450':'#7a8070';
    const stoneSh =G.shadowWorld?'#241430':'#505848';
    let sg=ctx.createRadialGradient(s.x-5,s.y-4,2,s.x,s.y,18);
    sg.addColorStop(0,G.shadowWorld?'#5a3878':'#9a9e90');
    sg.addColorStop(1,stoneCol);
    ctx.fillStyle=sg;ctx.beginPath();ctx.ellipse(s.x,s.y+2,22,13,0.15,0,Math.PI*2);ctx.fill();
    ctx.fillStyle=stoneSh;ctx.beginPath();ctx.ellipse(s.x+4,s.y+6,14,7,0.15,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=0.25;ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(s.x-5,s.y-3,9,4,0.15,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;

    // Crystal shard on top
    const cryCol=learned?'#e0c8ff':near?'rgba(255,220,120,0.9)':'rgba(180,190,200,0.7)';
    if(learned){ctx.shadowColor='#c090ff';ctx.shadowBlur=learned?18+pulse*12:0;}
    // Main crystal
    ctx.fillStyle=cryCol;
    ctx.beginPath();
    ctx.moveTo(s.x,s.y-24-pulse*4);
    ctx.lineTo(s.x-7,s.y-8);ctx.lineTo(s.x-4,s.y-2);
    ctx.lineTo(s.x+4,s.y-2);ctx.lineTo(s.x+7,s.y-8);
    ctx.closePath();ctx.fill();
    ctx.shadowBlur=0;
    // Crystal face highlight
    ctx.globalAlpha=0.55;ctx.fillStyle='#fff';
    ctx.beginPath();ctx.moveTo(s.x,s.y-24-pulse*4);ctx.lineTo(s.x-7,s.y-8);ctx.lineTo(s.x-1,s.y-8);ctx.closePath();ctx.fill();
    ctx.globalAlpha=1;
    // Small side crystals
    for(let k=-1;k<=1;k+=2){
      ctx.fillStyle=learned?'rgba(210,180,255,0.8)':'rgba(160,170,180,0.5)';
      ctx.beginPath();
      ctx.moveTo(s.x+k*9,s.y-14-pulse*2);
      ctx.lineTo(s.x+k*5,s.y-4);ctx.lineTo(s.x+k*13,s.y-4);
      ctx.closePath();ctx.fill();
    }

    // Label
    if(learned){
      ctx.fillStyle='rgba(220,190,255,0.9)';ctx.font='bold 9px Georgia';ctx.textAlign='center';
      ctx.fillText('attuned',s.x,s.y-32-pulse*4);
    } else if(near){
      ctx.fillStyle='rgba(255,230,120,0.95)';ctx.font='bold 9px Georgia';ctx.textAlign='center';
      ctx.fillText('[E] attune',s.x,s.y-30);
    }
  });
}

function drawMarkers(){
  const tier2col={bloom:'#ffd0e0',weave:'#d0f0c0',echo:'#c0c8ff'};
  markers.forEach(m=>{
    if(m.shadow&&!G.shadowWorld)return;
    if(!m.shadow&&G.shadowWorld&&!G.shadowBloomActive)return;
    const pulse=0.7+Math.sin(G.t*2.2)*0.3;
    const col=m.solved?'#a0a090':tier2col[m.tier];
    // Glow
    if(!m.solved){ctx.shadowColor=col;ctx.shadowBlur=18*pulse;}
    ctx.fillStyle=m.solved?'#909088':col;
    Theme.roundRect(m.x-14,m.y-14,28,28,8);ctx.fill();
    ctx.shadowBlur=0;
    ctx.strokeStyle=m.solved?'#70706a':'rgba(255,255,255,0.6)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle=m.solved?'#606058':'#fff';ctx.font='bold 13px Georgia';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(m.solved?'✓':m.lbl,m.x,m.y);ctx.textBaseline='alphabetic';
    const near=dist(PL.x,PL.y,m.x,m.y)<48;
    if(near&&!m.solved){
      ctx.fillStyle='rgba(255,240,200,0.9)';ctx.font='9px Georgia';ctx.textAlign='center';
      ctx.fillText(`[SPACE] offer ${m.need}`,m.x,m.y-22);
    }
  });
}

function drawMemFragments(){
  memFragments.forEach(fr=>{
    if(fr.collected)return;
    const fl=Math.sin(G.t*1.6+fr.x)*3;
    ctx.shadowColor=fr.col;ctx.shadowBlur=12;
    ctx.fillStyle=fr.col;ctx.globalAlpha=0.9;
    Theme.roundRect(fr.x-12,fr.y-12+fl,24,24,6);ctx.fill();
    ctx.globalAlpha=1;ctx.shadowBlur=0;
    ctx.fillStyle='rgba(100,60,40,0.8)';ctx.font='10px Georgia';ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText('◉',fr.x,fr.y+fl);ctx.textBaseline='alphabetic';
    if(dist(PL.x,PL.y,fr.x,fr.y)<44){
      ctx.fillStyle='rgba(255,240,200,0.9)';ctx.font='9px Georgia';ctx.textAlign='center';
      ctx.fillText('[E] remember',fr.x,fr.y-20+fl);
    }
  });
}

// ═══════════════ PLAYER RENDER ═══════════════
function drawPlayer(){
  const{x,y}=PL;
  const sw=G.shadowWorld;
  const wk=PL.moving?Math.sin(G.t*7)*1.8:0;
  const bounce=PL.moving?Math.abs(Math.sin(G.t*7))*1.5:0;
  const windSway=Math.sin(G.t*1.1)*(WIND_MOODS[G.windMood]?.spd||1)*2.2;
  const ry=y-bounce*0.4; // slight bob up when walking

  // ── Ground shadow ──
  ctx.save();
  ctx.globalAlpha=0.18;
  const sg=ctx.createRadialGradient(x,ry+28,0,x,ry+28,14);
  sg.addColorStop(0,'rgba(80,40,60,0.7)');sg.addColorStop(1,'transparent');
  ctx.fillStyle=sg;ctx.beginPath();ctx.ellipse(x,ry+28,14,5,0,0,Math.PI*2);ctx.fill();
  ctx.restore();

  // ── Helper: gradient fill ──
  function gFill(grd){ctx.fillStyle=grd;ctx.fill();}

  // ── BACK HAIR (draw before body so it sits behind) ──
  const hBase=sw?'#3a1060':'#4a2810';
  const hMid =sw?'#6030a0':'#7a4828';
  const hShine=sw?'#9060c8':'#b87848';
  ctx.save();
  // Long right strand flowing in wind
  ctx.beginPath();
  ctx.moveTo(x+7,ry-12);
  ctx.bezierCurveTo(x+16+windSway,ry-2, x+14+windSway*1.8,ry+14, x+10+windSway*2.2,ry+28);
  ctx.bezierCurveTo(x+8+windSway*2,ry+34, x+4,ry+34, x+5,ry+26);
  ctx.bezierCurveTo(x+8,ry+16, x+11,ry+2, x+5,ry-10);
  ctx.closePath();
  let hg=ctx.createLinearGradient(x+4,ry-12,x+14+windSway,ry+28);
  hg.addColorStop(0,hMid);hg.addColorStop(0.5,hBase);hg.addColorStop(1,hBase);
  gFill(hg);
  // Long left strand
  ctx.beginPath();
  ctx.moveTo(x-7,ry-12);
  ctx.bezierCurveTo(x-15+windSway*0.6,ry-2, x-13+windSway*0.9,ry+12, x-9+windSway*1.1,ry+26);
  ctx.bezierCurveTo(x-7+windSway,ry+32, x-3,ry+32, x-4,ry+24);
  ctx.bezierCurveTo(x-8,ry+14, x-10,ry+2, x-4,ry-10);
  ctx.closePath();
  hg=ctx.createLinearGradient(x-14,ry-12,x-6,ry+28);
  hg.addColorStop(0,hMid);hg.addColorStop(0.5,hBase);hg.addColorStop(1,hBase);
  gFill(hg);
  ctx.restore();

  // ── DRESS (puffy A-line skirt with gradient shading) ──
  ctx.save();
  const dTop=sw?'#7040b0':'#e8609a';
  const dBot=sw?'#4820808':'#c04080';
  const dHem=sw?'#9060c8':'#f090c0';
  // Skirt
  ctx.beginPath();
  ctx.moveTo(x-7,ry+6+wk*0.4);
  ctx.bezierCurveTo(x-16,ry+16, x-13,ry+28, x-9,ry+32);
  ctx.lineTo(x+9,ry+32);
  ctx.bezierCurveTo(x+13,ry+28, x+16,ry+16, x+7,ry+6+wk*0.4);
  ctx.closePath();
  let dg=ctx.createLinearGradient(x-13,ry+6,x+13,ry+32);
  dg.addColorStop(0,dTop);dg.addColorStop(0.6,dBot);dg.addColorStop(1,dBot);
  gFill(dg);
  // Hem glow strip
  ctx.globalAlpha=0.45;
  ctx.beginPath();
  ctx.moveTo(x-9,ry+28);ctx.bezierCurveTo(x-6,ry+26,x+6,ry+26,x+9,ry+28);
  ctx.bezierCurveTo(x+8,ry+33,x-8,ry+33,x-9,ry+28);ctx.closePath();
  ctx.fillStyle=dHem;ctx.fill();
  ctx.globalAlpha=1;
  // Bodice
  ctx.beginPath();ctx.ellipse(x,ry+3+wk*0.2,6.5,8,0,0,Math.PI*2);
  dg=ctx.createRadialGradient(x-2,ry,2,x,ry+3,9);
  dg.addColorStop(0,sw?'#9060c8':'#f080b0');dg.addColorStop(1,dTop);
  gFill(dg);
  // Collar / neck ruffle
  ctx.beginPath();ctx.ellipse(x,ry-1+wk*0.2,5,2.5,0,0,Math.PI*2);
  ctx.fillStyle=sw?'#d0b0f0':'#fff0f8';ctx.fill();
  ctx.restore();

  // ── LEGS ──
  ctx.save();
  const skinCol=sw?'#c0a0d0':'#fcd8b8';
  const skinShad=sw?'#a070b0':'#e8b898';
  // Left leg
  ctx.beginPath();ctx.ellipse(x-3.5,ry+28+wk*0.6,2.8,4,0.1,0,Math.PI*2);
  let lg=ctx.createRadialGradient(x-4.5,ry+26,0,x-3.5,ry+28,5);
  lg.addColorStop(0,skinCol);lg.addColorStop(1,skinShad);gFill(lg);
  // Right leg
  ctx.beginPath();ctx.ellipse(x+3.5,ry+28-wk*0.6,2.8,4,-0.1,0,Math.PI*2);
  lg=ctx.createRadialGradient(x+4.5,ry+26,0,x+3.5,ry+28,5);
  lg.addColorStop(0,skinCol);lg.addColorStop(1,skinShad);gFill(lg);
  // Shoes (round Mary-Jane style)
  ctx.beginPath();ctx.ellipse(x-3.5,ry+32+wk*0.5,4,2.5,0.1,0,Math.PI*2);
  ctx.fillStyle=sw?'#604080':'#8b3060';ctx.fill();
  ctx.beginPath();ctx.ellipse(x+3.5,ry+32-wk*0.5,4,2.5,-0.1,0,Math.PI*2);
  ctx.fillStyle=sw?'#604080':'#8b3060';ctx.fill();
  // Shoe shine
  ctx.globalAlpha=0.35;ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(x-4,ry+31+wk*0.5,1.5,1,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+3,ry+31-wk*0.5,1.5,1,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;ctx.restore();

  // ── ARMS ──
  ctx.save();ctx.lineCap='round';ctx.lineJoin='round';
  const armCol=sw?'#b090d0':'#fcd8b8';
  // Right arm (holds basket side — right)
  ctx.strokeStyle=armCol;ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(x+6,ry+2+wk*0.2);
  ctx.quadraticCurveTo(x+13,ry+10,x+11,ry+18-wk);ctx.stroke();
  ctx.strokeStyle=sw?'#9070b0':'#e8b898';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(x+6,ry+2+wk*0.2);
  ctx.quadraticCurveTo(x+13,ry+10,x+11,ry+18-wk);ctx.stroke();
  // Left arm (basket arm)
  ctx.strokeStyle=armCol;ctx.lineWidth=4;
  ctx.beginPath();ctx.moveTo(x-6,ry+2+wk*0.2);
  ctx.quadraticCurveTo(x-13,ry+10,x-11,ry+18+wk);ctx.stroke();
  ctx.strokeStyle=sw?'#9070b0':'#e8b898';ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(x-6,ry+2+wk*0.2);
  ctx.quadraticCurveTo(x-13,ry+10,x-11,ry+18+wk);ctx.stroke();
  ctx.restore();

  // ── HEAD ──
  ctx.save();
  const faceLight=sw?'#e0c0e8':'#feebd8';
  const faceMid  =sw?'#c8a0d0':'#fcd8b8';
  const faceShad =sw?'#a878b8':'#e8b898';
  // Head base with gradient
  ctx.beginPath();ctx.arc(x,ry-8,11,0,Math.PI*2);
  let fg=ctx.createRadialGradient(x-3,ry-11,1,x,ry-8,12);
  fg.addColorStop(0,faceLight);fg.addColorStop(0.6,faceMid);fg.addColorStop(1,faceShad);
  gFill(fg);
  ctx.restore();

  // ── FRONT HAIR (fringe over face) ──
  ctx.save();
  ctx.beginPath();
  ctx.arc(x,ry-17,9,Math.PI,0);
  ctx.bezierCurveTo(x+12,ry-10, x+8,ry-4, x+5,ry-5);
  ctx.bezierCurveTo(x+1,ry-3, x-1,ry-3, x-5,ry-5);
  ctx.bezierCurveTo(x-8,ry-4, x-12,ry-10, x,ry-17);
  ctx.closePath();
  hg=ctx.createLinearGradient(x-9,ry-18,x+9,ry-4);
  hg.addColorStop(0,hMid);hg.addColorStop(1,hBase);
  gFill(hg);
  // Hair top volume
  ctx.beginPath();ctx.ellipse(x,ry-18,8,5,0,0,Math.PI*2);
  hg=ctx.createRadialGradient(x-2,ry-20,1,x,ry-18,8);
  hg.addColorStop(0,hShine);hg.addColorStop(0.5,hMid);hg.addColorStop(1,hBase);
  gFill(hg);
  ctx.restore();

  // ── HAIR BOW ──
  ctx.save();
  const bowCol=sw?'#e0b0ff':'#ff8ab0';
  const bowX=x+7, bowY=ry-18;
  // Left loop
  ctx.beginPath();ctx.ellipse(bowX-4,bowY,4,2.5,-0.4,0,Math.PI*2);
  ctx.fillStyle=bowCol;ctx.fill();
  // Right loop
  ctx.beginPath();ctx.ellipse(bowX+4,bowY,4,2.5,0.4,0,Math.PI*2);
  ctx.fillStyle=bowCol;ctx.fill();
  // Centre knot
  ctx.beginPath();ctx.ellipse(bowX,bowY,2,2,0,0,Math.PI*2);
  ctx.fillStyle=sw?'#f0d0ff':'#ffb0cc';ctx.fill();
  // Bow highlight
  ctx.globalAlpha=0.5;ctx.fillStyle='#fff';
  ctx.beginPath();ctx.ellipse(bowX-4,bowY-0.8,2,1,-0.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(bowX+4,bowY-0.8,2,1,0.3,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;ctx.restore();

  // ── EYES ──
  ctx.save();
  // Eye whites (subtle)
  ctx.fillStyle='#fff8f0';
  ctx.beginPath();ctx.ellipse(x-3.5,ry-8,3,3.5,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+3.5,ry-8,3,3.5,0,0,Math.PI*2);ctx.fill();
  // Iris gradient
  const eyeCol=sw?'#8040d0':'#4a2878';
  let eg=ctx.createRadialGradient(x-3.5,ry-9,0,x-3.5,ry-8,3);
  eg.addColorStop(0,sw?'#c0a0f8':'#8060d0');eg.addColorStop(1,eyeCol);
  ctx.fillStyle=eg;ctx.beginPath();ctx.ellipse(x-3.5,ry-8,2.5,3,0,0,Math.PI*2);ctx.fill();
  eg=ctx.createRadialGradient(x+3.5,ry-9,0,x+3.5,ry-8,3);
  eg.addColorStop(0,sw?'#c0a0f8':'#8060d0');eg.addColorStop(1,eyeCol);
  ctx.fillStyle=eg;ctx.beginPath();ctx.ellipse(x+3.5,ry-8,2.5,3,0,0,Math.PI*2);ctx.fill();
  // Pupil
  ctx.fillStyle=sw?'#200840':'#1a0830';
  ctx.beginPath();ctx.ellipse(x-3.5,ry-8,1.4,1.8,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+3.5,ry-8,1.4,1.8,0,0,Math.PI*2);ctx.fill();
  // Eye shine — large + small dot
  ctx.fillStyle='#ffffff';
  ctx.beginPath();ctx.ellipse(x-4.4,ry-9.5,1.1,1.1,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x-2.8,ry-7.5,0.5,0.5,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+2.6,ry-9.5,1.1,1.1,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+4.2,ry-7.5,0.5,0.5,0,0,Math.PI*2);ctx.fill();
  // Eyelash top
  ctx.strokeStyle=sw?'#5020a0':'#2a1040';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.arc(x-3.5,ry-8,2.5,Math.PI+0.3,Math.PI*2-0.3);ctx.stroke();
  ctx.beginPath();ctx.arc(x+3.5,ry-8,2.5,Math.PI+0.3,Math.PI*2-0.3);ctx.stroke();
  ctx.restore();

  // ── BLUSH ──
  ctx.save();ctx.globalAlpha=0.32;
  const blushCol=sw?'#d090e8':'#ffaacc';
  ctx.fillStyle=blushCol;
  ctx.beginPath();ctx.ellipse(x-6.5,ry-5,3.5,2,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(x+6.5,ry-5,3.5,2,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;ctx.restore();

  // ── NOSE & MOUTH ──
  ctx.save();
  ctx.fillStyle=sw?'#b080c0':'#e8a090';
  ctx.beginPath();ctx.ellipse(x,ry-4.5,1,0.7,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle=sw?'#9060a8':'#d06888';ctx.lineWidth=1.1;ctx.lineCap='round';
  ctx.beginPath();ctx.arc(x,ry-2,2.2,0.15,Math.PI-0.15);ctx.stroke();
  ctx.restore();

  // ── BASKET (left hand, swings with walk) ──
  ctx.save();
  const bx2=x-11+wk*0.5;
  const by2=ry+19+Math.abs(wk)*0.3;
  const full=PL.inv.length>=(PL.maxInv||8);
  // Basket shadow
  ctx.globalAlpha=0.15;ctx.fillStyle='#402030';
  ctx.beginPath();ctx.ellipse(bx2,by2+5,5,2,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
  // Basket body gradient
  let bg=ctx.createLinearGradient(bx2-6,by2-5,bx2+6,by2+5);
  bg.addColorStop(0,sw?'#8060b0':full?'#e09050':'#c87840');
  bg.addColorStop(1,sw?'#503880':full?'#a86030':'#8a5020');
  ctx.beginPath();
  ctx.moveTo(bx2-6,by2-3);ctx.lineTo(bx2+6,by2-3);
  ctx.bezierCurveTo(bx2+7,by2+1,bx2+5,by2+5,bx2+3,by2+6);
  ctx.lineTo(bx2-3,by2+6);
  ctx.bezierCurveTo(bx2-5,by2+5,bx2-7,by2+1,bx2-6,by2-3);
  ctx.closePath();ctx.fillStyle=bg;ctx.fill();
  // Weave texture
  ctx.strokeStyle=sw?'#3820608':'#6a3810';ctx.lineWidth=0.7;
  for(let wl=-1;wl<=1;wl++){
    ctx.beginPath();ctx.moveTo(bx2-5,by2+wl*2);ctx.lineTo(bx2+5,by2+wl*2);ctx.stroke();
  }
  ctx.beginPath();ctx.moveTo(bx2,by2-3);ctx.lineTo(bx2,by2+6);ctx.stroke();
  // Rim
  ctx.fillStyle=sw?'#9070c0':full?'#f0a060':'#d89050';
  ctx.beginPath();ctx.ellipse(bx2,by2-3,6.5,2,0,0,Math.PI*2);ctx.fill();
  // Handle arc
  ctx.strokeStyle=sw?'#7050a0':'#b87030';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.arc(bx2,by2-3,5,Math.PI,0);ctx.stroke();
  // Contents (top petal visible)
  if(PL.inv.length>0){
    const topT=PL.inv[PL.inv.length-1];
    ctx.globalAlpha=0.9;
    ctx.fillStyle=full?'#f79ab8':PT[topT].col;
    ctx.beginPath();ctx.ellipse(bx2,by2-4,3.5,2,0,0,Math.PI*2);ctx.fill();
    if(full){
      ctx.fillStyle='#b0e890';
      ctx.beginPath();ctx.ellipse(bx2+2,by2-5,2.5,1.5,0.3,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  }
  ctx.restore();
}
// ═══════════════ FALLING PETALS ═══════════════
function updatePetals(){
  const sw=G.shadowWorld;
  const wm=WIND_MOODS[G.windMood];
  wPetals.forEach(p=>{
    p.age++;
    const wx=Math.cos(G.windAngle)*wm.spd*0.4;
    const wy=Math.sin(G.windAngle)*wm.spd*0.2;
    if(sw){p.x-=p.vx+wx;p.y-=p.vy+wy;}// reverse in shadow world
    else{p.x+=p.vx+wx+Math.sin(G.t*0.9+p.rot)*0.25;p.y+=p.vy+wy;}
    p.rot+=p.rotV;
    if(p.y>H+16||p.y<-16){Object.assign(p,mkWorldPetal());p.y=sw?H+10:-10;}
    if(p.x>W+16)p.x=-10;if(p.x<-16)p.x=W+10;
    // Collect nearby
    if(p.collectible&&!p.collected&&dist(PL.x,PL.y,p.x,p.y)<28&&PL.inv.length<PL.maxInv){
      p.collected=true;PL.inv.push(p.type);
      addPop(p.x,p.y,PT[p.type].icon,PT[p.type].col);
    }
  });
}
function drawPetal(cx,cy,rot,sz,col,dark,alpha){
  // Realistic 5-petal flower shape
  ctx.save();ctx.globalAlpha=alpha;ctx.translate(cx,cy);ctx.rotate(rot);
  for(let i=0;i<5;i++){
    ctx.save();ctx.rotate(i*Math.PI*2/5);
    ctx.fillStyle=col;
    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.bezierCurveTo(-sz*0.4,-sz*0.5,-sz*0.4,-sz*1.1,0,-sz*1.3);
    ctx.bezierCurveTo(sz*0.4,-sz*1.1,sz*0.4,-sz*0.5,0,0);
    ctx.fill();
    // Inner vein
    ctx.strokeStyle=dark;ctx.lineWidth=0.5;ctx.globalAlpha=alpha*0.5;
    ctx.beginPath();ctx.moveTo(0,0);ctx.lineTo(0,-sz*1.1);ctx.stroke();
    ctx.globalAlpha=alpha;
    ctx.restore();
  }
  // Centre
  ctx.fillStyle='#fff8e0';ctx.beginPath();ctx.arc(0,0,sz*0.28,0,Math.PI*2);ctx.fill();
  ctx.restore();
}
function drawPetals(){
  const pulse=0.5+0.5*Math.sin(G.t*3.5);
  wPetals.forEach(p=>{
    if(p.collected)return;
    const pal=PT[p.type];
    const col=G.shadowWorld?'#b070e0':pal.col;
    const dark=G.shadowWorld?'#6030a0':pal.dark;
    if(p.collectible&&!G.shadowWorld){
      // Warm radial bloom glow
      ctx.save();
      const grd=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.sz*5);
      grd.addColorStop(0,pal.col+'cc');
      grd.addColorStop(0.4,pal.col+'55');
      grd.addColorStop(1,'transparent');
      ctx.globalAlpha=0.55+0.25*pulse;
      ctx.fillStyle=grd;
      ctx.beginPath();ctx.arc(p.x,p.y,p.sz*5,0,Math.PI*2);ctx.fill();
      // Sparkle orbit
      for(let i=0;i<4;i++){
        const ang=G.t*2.2+i*Math.PI/2;
        const sx=p.x+Math.cos(ang)*p.sz*3;
        const sy=p.y+Math.sin(ang)*p.sz*3;
        ctx.globalAlpha=(0.6+0.4*pulse)*p.op;
        ctx.fillStyle='#fff';
        ctx.beginPath();ctx.arc(sx,sy,1.1,0,Math.PI*2);ctx.fill();
        ctx.fillStyle=pal.col;
        ctx.beginPath();ctx.arc(sx,sy,0.6,0,Math.PI*2);ctx.fill();
      }
      ctx.restore();
    }
    // Petal body — realistic flower
    drawPetal(p.x,p.y,p.rot,p.sz*(p.collectible?1.0:0.75),col,dark,
      p.op*(p.collectible?1.0:0.38));
  });
}

// ═══════════════ WIND PARTICLES ═══════════════
function updateWind(){
  const wm=WIND_MOODS[G.windMood];
  // mood change
  G.windMoodTimer-=G.dt;
  if(G.windMoodTimer<=0){
    const moods=Object.keys(WIND_MOODS);
    G.windMood=moods[Math.floor(Math.random()*moods.length)];
    G.windMoodTimer=20+Math.random()*40;
    notice(`Wind feels ${G.windMood}...`);
  }
  // angle drift
  G.windAngle+=WIND_MOODS[G.windMood].angle_delta*G.dt*60;
  // learned stones alter wind
  windStones.filter(s=>s.learned).forEach(s=>{G.windAngle=lerp(G.windAngle,s.dir,0.001);});
  const spd=wm.spd;
  wndPtcl.forEach(p=>{
    p.life+=G.dt*0.4*spd;
    if(p.life>1){Object.assign(p,mkWndP());p.life=0;}
    p.x+=Math.cos(G.windAngle)*p.spd*spd;
    p.y+=Math.sin(G.windAngle)*p.spd*spd*0.4;
    if(p.x>W+10)p.x=-5;if(p.x<-10)p.x=W+5;
    if(p.y>H+10)p.y=-5;if(p.y<-10)p.y=H+5;
  });
}
function drawWind(){
  const wm=WIND_MOODS[G.windMood];
  wndPtcl.forEach(p=>{
    const a=(1-p.life)*0.35;
    ctx.globalAlpha=a;ctx.fillStyle=wm.pcol;
    ctx.beginPath();ctx.arc(p.x,p.y,p.sz*(1-p.life*0.5),0,Math.PI*2);ctx.fill();
  });
  ctx.globalAlpha=1;
}

function drawShadowOverlay(){
  if(!G.shadowWorld&&!G.shadowBloomActive)return;

  ctx.globalAlpha=a;
  const sg=ctx.createLinearGradient(0,0,0,H);

  });
  if(G.shadowBloomActive){
    ctx.globalAlpha=0.12*(Math.sin(G.t*3)*0.5+0.5);

    const pct=G.shadowBloomTimer/30;

// ═══════════════ INPUT ═══════════════
const keys={};
window.addEventListener('keydown',e=>{
  if(keys[e.key])return;
  keys[e.key]=true;
  if(e.key==='Tab'){e.preventDefault();G.shadowWorld=!G.shadowWorld;notice(G.shadowWorld?'Shadow world...':'Real world');}
  if(e.key==='c'||e.key==='C'){G.showCombineUI=!G.showCombineUI;}
  if(e.key==='r'||e.key==='R'){
    // rest at nearest stone — advance time
    const near=windStones.find(s=>dist(PL.x,PL.y,s.x,s.y)<55);
    if(near){G.dayT=(G.dayT+60)%240;notice('You rest... time drifts.');}
    else notice('Find a mossy stone to rest.');
  }
  if(e.key==='e'||e.key==='E'){doInteract();}
  if(e.key===' '){e.preventDefault();doPlace();}
  if(e.key==='1'||e.key==='2'||e.key==='3'||e.key==='4'){
    if(G.showCombineUI){
      const idx=parseInt(e.key)-1;
      const types=Object.keys(PT);
      const owned=types.filter(t=>PL.inv.includes(t));
      if(owned[idx]){
        G.combineSlots[G.combineSelected]=owned[idx];
        G.combineSelected=(G.combineSelected+1)%2;
      }
    }
  }
  if(e.key==='Enter'&&G.showCombineUI){doCombine();}
});
window.addEventListener('keyup',e=>{keys[e.key]=false;});

function doInteract(){
  // Collect memory fragment
  const fr=memFragments.find(f=>!f.collected&&dist(PL.x,PL.y,f.x,f.y)<44);
  if(fr){fr.collected=true;G.memoriesFound++;G.memoryScene=fr;G.memoryTimer=4;
    notice(`Memory recovered: "${fr.scene}"`);G.silenceMeter=Math.max(0,G.silenceMeter-0.08);return;}
  // Attune wind stone
  const ws=windStones.find(s=>!s.learned&&dist(PL.x,PL.y,s.x,s.y)<50);
  if(ws){ws.learned=true;G.windAngle=ws.dir;notice('Wind stone attuned — wind remembers this path!');return;}
}

function doPlace(){
  // Place a single petal on nearest unsolved marker
  const m=markers.find(mk=>!mk.solved&&dist(PL.x,PL.y,mk.x,mk.y)<52&&(!mk.shadow||G.shadowWorld||G.shadowBloomActive));
  if(!m)return;
  // Check inventory for match
  const idx=PL.inv.indexOf(m.need);
  if(idx!==-1){
    PL.inv.splice(idx,1);solveMarker(m);return;
  }
  // Check combinations
  const ci=PL.combinations.indexOf(m.need);
  if(ci!==-1){
    PL.combinations.splice(ci,1);solveMarker(m);return;
  }
  notice(`Need: ${m.need}`);
}

function solveMarker(m){
  m.solved=true;G.puzzlesSolved++;G.silenceMeter=Math.max(0,G.silenceMeter-0.1);
  addPop(m.x,m.y,'✦ restored',m.col);
  // Special effects per tier
  if(m.need==='rainEcho'){ponds.find(p=>p.dry)&&(ponds.find(p=>p.dry).dry=false);notice('A pond fills with memory...');}
  if(m.need==='rootBridge'){notice('A living bridge grows across the gap!');}
  if(m.need==='shadowBloom'){G.shadowBloomActive=true;G.shadowBloomTimer=30;notice('The shadow world blooms open!');}
  if(m.need==='windLens'){G.windStrength=2.2;notice('Wind bends to your will!');}
  checkWin();
}

function doCombine(){
  const[a,b]=G.combineSlots;
  if(!a||!b){notice('Select 2 petals first (1-4 keys)');return;}
  const rec=findRecipe(a,b);
  if(!rec){notice('These petals don\'t combine...');return;}
  // Remove from inventory
  const ia=PL.inv.indexOf(a),ib=PL.inv.indexOf(b);
  if(ia===-1||ib===-1){notice('You need both petals!');return;}
  PL.inv.splice(ia,1);const ib2=PL.inv.indexOf(b);PL.inv.splice(ib2,1);
  PL.combinations.push(rec.r);
  G.combineSlots=[null,null];G.showCombineUI=false;
  addPop(PL.x,PL.y,rec.icon+' '+rec.name,rec.col);
  notice(`Combined: ${rec.name} — ${rec.desc}`);
}

function checkWin(){
  if(markers.every(m=>m.solved)&&G.memoriesFound>=3){G.won=true;}
}

// ═══════════════ HUD ═══════════════
function drawHUD(){
  ctx.save();
  const t=G.t;

  // soft floating pill helper
  function softPill(x,y,w,h,r,fillCol,glowCol){
    ctx.shadowColor=glowCol||'rgba(0,0,0,0)';
    ctx.shadowBlur=glowCol?12:0;
    ctx.beginPath();
    ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);
    ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
    ctx.fillStyle=fillCol;ctx.fill();
    ctx.shadowBlur=0;
  }

  // ── INVENTORY tray (bottom-left, warm cream floating pill) ──
  const maxSlots=PL.maxInv||8;
  const filled=PL.inv.length;
  const isFull=filled>=maxSlots;
  const slotR=11,gap=4,trayPad=8;
  const trayW=trayPad*2+maxSlots*(slotR*2+gap)-gap;
  const trayH=slotR*2+trayPad*2+14;
  const trayX=16,trayY=H-trayH-14;
  const pulse=0.5+0.5*Math.sin(t*3);

  ctx.globalAlpha=0.88;
  softPill(trayX,trayY,trayW,trayH,18,
    isFull?'rgba(255,220,230,0.95)':'rgba(245,238,228,0.92)',
    isFull?'rgba(255,140,180,'+(0.4+0.3*pulse)+')':'rgba(210,190,170,0.2)');
  ctx.globalAlpha=0.7;
  ctx.strokeStyle=isFull?'rgba(240,120,160,0.5)':'rgba(200,175,150,0.35)';
  ctx.lineWidth=1.2;ctx.stroke();
  ctx.globalAlpha=1;

  // label
  ctx.font='bold 8px Georgia';ctx.textAlign='left';
  ctx.fillStyle=isFull?'#c04868':'#9a8070';
  ctx.fillText(isFull?'🧺 FULL':'🧺 petals',trayX+trayPad,trayY+12);
  ctx.font='8px Georgia';ctx.textAlign='right';ctx.fillStyle='#b09080';
  ctx.fillText(filled+'/'+maxSlots,trayX+trayW-trayPad,trayY+12);

  // slot circles
  for(let i=0;i<maxSlots;i++){
    const sx=trayX+trayPad+i*(slotR*2+gap)+slotR;
    const sy=trayY+trayPad+14+slotR;
    const tp=PL.inv[i];
    if(tp){
      const sg=ctx.createRadialGradient(sx-2,sy-2,1,sx,sy,slotR);
      sg.addColorStop(0,'#fff');sg.addColorStop(0.3,PT[tp].col);sg.addColorStop(1,PT[tp].dark);
      ctx.beginPath();ctx.arc(sx,sy,slotR,0,Math.PI*2);
      ctx.fillStyle=sg;ctx.fill();
      ctx.strokeStyle=PT[tp].dark;ctx.lineWidth=1;ctx.stroke();
      ctx.fillStyle='#fff';ctx.font='9px serif';ctx.textAlign='center';
      ctx.fillText(PT[tp].label,sx,sy+3);
    } else {
      ctx.beginPath();ctx.arc(sx,sy,slotR,0,Math.PI*2);
      ctx.fillStyle='rgba(200,185,170,0.18)';ctx.fill();
      ctx.strokeStyle='rgba(190,165,145,0.35)';ctx.lineWidth=0.8;
      ctx.setLineDash([3,3]);ctx.stroke();ctx.setLineDash([]);
    }
  }

  // discovered combination orbs right of tray
  PL.combinations.slice(0,3).forEach((r,i)=>{
    const rec=RECIPES.find(rc=>rc.r===r);if(!rec)return;
    const ox=trayX+trayW+12+i*26,oy=trayY+trayH/2;
    ctx.shadowColor=rec.col;ctx.shadowBlur=10;
    ctx.beginPath();ctx.arc(ox,oy,11,0,Math.PI*2);
    ctx.fillStyle=rec.col;ctx.fill();ctx.shadowBlur=0;
    ctx.strokeStyle='rgba(255,255,255,0.6)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.font='11px serif';ctx.textAlign='center';ctx.fillText(rec.icon,ox,oy+4);
  });

  // ── WORLD MEMORY badge (top-left, small pill with progress fill) ──
  const silPct=Math.round((1-G.silenceMeter)*100);
  const smW=128,smH=20,smX=14,smY=14;
  ctx.globalAlpha=0.82;
  softPill(smX,smY,smW,smH,10,'rgba(240,232,220,0.9)',null);
  ctx.globalAlpha=1;
  const fW=Math.max(0,(1-G.silenceMeter))*(smW-4);
  if(fW>0){
    const fg=ctx.createLinearGradient(smX+2,0,smX+2+fW,0);
    fg.addColorStop(0,'#d4a8b8');fg.addColorStop(1,'#98d4a0');
    ctx.fillStyle=fg;
    ctx.beginPath();ctx.roundRect(smX+2,smY+2,fW,smH-4,8);ctx.fill();
  }
  ctx.fillStyle='#8a7060';ctx.font='8px Georgia';ctx.textAlign='left';
  ctx.fillText('✦ Memory '+silPct+'%',smX+7,smY+13);

  // ── WIND badge (top-right, orb + label pill) ──
  const wm=WIND_MOODS[G.windMood];
  const wbX=W-110,wbY=10;
  ctx.globalAlpha=0.82;
  softPill(wbX,wbY,100,22,11,'rgba(240,236,226,0.9)',null);
  ctx.globalAlpha=1;
  const orbX=wbX+14,orbY=wbY+11;
  const wog=ctx.createRadialGradient(orbX-2,orbY-2,1,orbX,orbY,8);
  wog.addColorStop(0,'#fff');wog.addColorStop(1,wm.col);
  ctx.beginPath();ctx.arc(orbX,orbY,7,0,Math.PI*2);ctx.fillStyle=wog;ctx.fill();
  ctx.strokeStyle='rgba(80,40,30,0.7)';ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(orbX,orbY);
  ctx.lineTo(orbX+Math.cos(G.windAngle)*5,orbY+Math.sin(G.windAngle)*5);ctx.stroke();
  ctx.fillStyle='#7a6a58';ctx.font='8px Georgia';ctx.textAlign='left';
  ctx.fillText(G.windMood,wbX+25,wbY+14);
  const{p:dp}=dayPhase();
  ctx.fillStyle='rgba(140,110,80,0.8)';ctx.font='italic 8px Georgia';ctx.textAlign='right';
  ctx.fillText(dp,W-8,wbY+14);

  // ── PUZZLE COUNTER badge (bottom-right, lavender gem pill) ──
  const pcX=W-78,pcY=H-46;
  const gemPulse=0.5+0.5*Math.sin(t*2.5);
  ctx.globalAlpha=0.88;
  softPill(pcX,pcY,68,34,17,'rgba(220,210,248,0.92)','rgba(180,155,255,'+(0.3+0.2*gemPulse)+')');
  ctx.globalAlpha=1;
  ctx.fillStyle='#5a40b0';ctx.font='bold 11px Georgia';ctx.textAlign='center';
  ctx.fillText('◈ '+G.puzzlesSolved+'/'+markers.length,pcX+34,pcY+14);
  ctx.fillStyle='#8a72cc';ctx.font='8px Georgia';
  ctx.fillText('mem '+G.memoriesFound+'/'+G.memoriesTotal,pcX+34,pcY+27);

  ctx.restore();
}

function drawToast(){
  let hint='';
  if(G.nearStone&&!G.nearStone.learned) hint='[E] attune wind stone  ·  [R] rest to advance time';
  else if(G.nearMarker&&!G.nearMarker.solved) hint='[E] use spell to restore this zone';
  else if(G.nearFragment&&!G.nearFragment.collected) hint='[E] collect memory fragment';
  else if(PL.inv.length>=2) hint='[C] open cauldron  ·  combine petals into a spell';
  else if(PL.inv.length>0) hint='collect more petals  ·  [Tab] enter shadow world';
  else hint='walk into glowing petals to collect them';
  const tw=Math.min(480,hint.length*6.2+44),th=28;
  const tx=W/2-tw/2,ty=H-50;
  ctx.save();
  // Soft dark leaf-shaped pill — no hard box
  ctx.globalAlpha=0.82;
  ctx.shadowColor='rgba(60,30,50,0.35)';ctx.shadowBlur=14;
  ctx.beginPath();
  ctx.moveTo(tx+14,ty);ctx.lineTo(tx+tw-14,ty);
  ctx.quadraticCurveTo(tx+tw,ty,tx+tw,ty+14);
  ctx.lineTo(tx+tw,ty+th-14);ctx.quadraticCurveTo(tx+tw,ty+th,tx+tw-14,ty+th);
  ctx.lineTo(tx+14,ty+th);ctx.quadraticCurveTo(tx,ty+th,tx,ty+th-14);
  ctx.lineTo(tx,ty+14);ctx.quadraticCurveTo(tx,ty,tx+14,ty);
  ctx.closePath();
  ctx.fillStyle='rgba(28,14,24,0.78)';ctx.fill();
  ctx.shadowBlur=0;ctx.globalAlpha=1;
  ctx.fillStyle='rgba(245,215,232,0.92)';ctx.font='10px Georgia';ctx.textAlign='center';
  ctx.fillText(hint,W/2,ty+18);
  ctx.restore();
}
// ═══════════════ NOTICE / POPS ═══════════════
function drawNotice(){
  if(G.noticeTimer<=0)return;
  const a=Math.min(1,G.noticeTimer*2);
  const tw=300,th=32,tx=W/2-150,ty=H*0.16;
  ctx.save();ctx.globalAlpha=a*0.9;
  // Floating warm cream pill with subtle glow
  ctx.shadowColor='rgba(220,180,140,0.5)';ctx.shadowBlur=16;
  ctx.beginPath();
  ctx.moveTo(tx+16,ty);ctx.lineTo(tx+tw-16,ty);
  ctx.quadraticCurveTo(tx+tw,ty,tx+tw,ty+16);
  ctx.lineTo(tx+tw,ty+th-16);ctx.quadraticCurveTo(tx+tw,ty+th,tx+tw-16,ty+th);
  ctx.lineTo(tx+16,ty+th);ctx.quadraticCurveTo(tx,ty+th,tx,ty+th-16);
  ctx.lineTo(tx,ty+16);ctx.quadraticCurveTo(tx,ty,tx+16,ty);
  ctx.closePath();
  ctx.fillStyle='rgba(252,244,234,0.96)';ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle='rgba(210,170,130,0.4)';ctx.lineWidth=1;ctx.stroke();
  ctx.globalAlpha=a;ctx.fillStyle='#7a5848';ctx.font='11px Georgia';ctx.textAlign='center';
  ctx.fillText(G.lastNotice,W/2,ty+21);
  ctx.restore();
}
function drawPops(){
  pops=pops.filter(p=>p.p<1);
  pops.forEach(p=>{
    p.p+=0.025;
    ctx.globalAlpha=(1-p.p)*0.85;ctx.fillStyle=p.col;
    ctx.font=`bold ${13-p.p*4}px Georgia`;ctx.textAlign='center';
    ctx.fillText(p.text,p.x,p.y-20-p.p*35);
    ctx.strokeStyle=p.col;ctx.lineWidth=1.5;ctx.globalAlpha=(1-p.p)*0.5;
    ctx.beginPath();ctx.arc(p.x,p.y,p.p*36,0,Math.PI*2);ctx.stroke();
  });
  ctx.globalAlpha=1;
}

// ═══════════════ WIN SCREEN ═══════════════
function drawTutorial(){
  // Dim backdrop
  ctx.globalAlpha=0.72;
  ctx.fillStyle='rgba(10,4,20,0.72)';
  ctx.fillRect(0,0,W,H);
  ctx.globalAlpha=1;

  const pw=480,ph=G.tutorialPage===0?370:320;
  const px=W/2-pw/2, py=H/2-ph/2;

  // Panel
  ctx.shadowColor='rgba(180,120,220,0.7)';ctx.shadowBlur=50;
  Theme.roundRect(px,py,pw,ph,24);
  ctx.fillStyle='rgba(255,248,255,0.97)';ctx.fill();
  ctx.shadowBlur=0;
  ctx.strokeStyle='#c890d8';ctx.lineWidth=2;ctx.stroke();

  ctx.textAlign='center';

  if(G.tutorialPage===0){
    // Page 1: Story + Goal
    ctx.fillStyle='#5a2850';ctx.font='bold 22px Georgia';
    ctx.fillText('✦ Petals & Echoes ✦',W/2,py+46);

    ctx.fillStyle='#7a4060';ctx.font='italic 14px Georgia';
    ctx.fillText('A gentle puzzle about restoring silence to a noisy world.',W/2,py+74);

    ctx.fillStyle='#5a2850';ctx.font='bold 15px Georgia';
    ctx.fillText('🎯  Your Goal',W/2,py+110);
    ctx.fillStyle='#6a3858';ctx.font='14px Georgia';
    ctx.fillText('Collect petals, combine them into spells,',W/2,py+132);
    ctx.fillText('and restore the 6 sacred zones to silence.',W/2,py+152);

    ctx.fillStyle='#5a2850';ctx.font='bold 15px Georgia';
    ctx.fillText('🎮  Controls',W/2,py+188);
    ctx.fillStyle='#6a3858';ctx.font='14px Georgia';
    ctx.fillText('W A S D  —  Move',W/2,py+210);
    ctx.fillText('Walk into glowing petals  —  Collect them',W/2,py+230);
    ctx.fillText('C  —  Open petal cauldron to combine',W/2,py+250);
    ctx.fillText('E  —  Interact with wind stones & markers',W/2,py+270);
    ctx.fillText('Tab  —  Toggle shadow world (reveals secrets)',W/2,py+290);

    // Next button
    ctx.shadowColor='rgba(180,100,200,0.5)';ctx.shadowBlur=18;
    Theme.roundRect(W/2-80,py+ph-56,160,36,12);
    ctx.fillStyle='#c078d8';ctx.fill();ctx.shadowBlur=0;
    ctx.strokeStyle='#a050b8';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 14px Georgia';
    ctx.fillText('Next  →',W/2,py+ph-32);

  } else {
    // Page 2: Alchemy hint + begin
    ctx.fillStyle='#5a2850';ctx.font='bold 20px Georgia';
    ctx.fillText('✦ Petal Alchemy ✦',W/2,py+46);

    ctx.fillStyle='#6a3858';ctx.font='14px Georgia';
    ctx.fillText('Combine petals at the cauldron (press C near it)',W/2,py+76);
    ctx.fillText('to brew spells that calm each noisy zone.',W/2,py+96);

    ctx.fillStyle='#5a2850';ctx.font='bold 15px Georgia';
    ctx.fillText('🌸  Known Recipes',W/2,py+128);
    ctx.fillStyle='#6a3858';ctx.font='14px Georgia';
    ctx.fillText('Cherry + Moss  →  Bloom Veil',W/2,py+150);
    ctx.fillText('Dew + Moon  →  Still Water',W/2,py+170);
    ctx.fillText('Cherry + Dew  →  Rose Mist',W/2,py+190);
    ctx.fillText('Moon 🌙 petals appear at night — use R at a wind stone to rest & advance time.',W/2,py+214);
    ctx.fillText('(Explore to discover more combinations!)',W/2,py+234);

    ctx.fillStyle='#7a4060';ctx.font='italic 13px Georgia';
    ctx.fillText('Tip: Wind stones shift the mood — use Tab in dark areas',W/2,py+244);

    // Begin button
    ctx.shadowColor='rgba(180,100,200,0.5)';ctx.shadowBlur=18;
    Theme.roundRect(W/2-100,py+ph-56,200,36,12);
    ctx.fillStyle='#b060c8';ctx.fill();ctx.shadowBlur=0;
    ctx.strokeStyle='#8840a8';ctx.lineWidth=1.5;ctx.stroke();
    ctx.fillStyle='#fff';ctx.font='bold 15px Georgia';
    ctx.fillText('Begin Journey  🌸',W/2,py+ph-32);
  }

  // Page dots
  for(let i=0;i<2;i++){
    ctx.beginPath();
    ctx.arc(W/2+(i===0?-10:10),py+ph-12,4,0,Math.PI*2);
    ctx.fillStyle=G.tutorialPage===i?'#b060c8':'#ddb8e8';
    ctx.fill();
  }

  // Click hitbox logic stored for use in click handler
  G._tutorialBtnY=py+ph-56; G._tutorialBtnH=36; G._tutorialPH=ph; G._tutorialPY=py;
}

function drawWin(){
  ctx.globalAlpha=0.96;
  ctx.shadowColor='rgba(200,160,220,0.6)';ctx.shadowBlur=40;
  Theme.roundRect(W/2-200,H/2-70,400,140,20);
  ctx.fillStyle='rgba(255,245,252,0.98)';ctx.fill();ctx.shadowBlur=0;
  ctx.strokeStyle='#d4a0c0';ctx.lineWidth=2;ctx.stroke();
  ctx.globalAlpha=1;
  ctx.fillStyle='#7a4060';ctx.font='bold 20px Georgia';ctx.textAlign='center';
  ctx.fillText('✦ All Echoes Restored ✦',W/2,H/2-36);
  ctx.fillStyle='#c47898';ctx.font='13px Georgia';
  ctx.fillText('The world remembers again.',W/2,H/2-12);
  ctx.fillStyle='#b09090';ctx.font='11px Georgia';
  ctx.fillText(`Puzzles: ${G.puzzlesSolved} · Memories: ${G.memoriesFound} · Silence lifted: ${Math.round((1-G.silenceMeter)*100)}%`,W/2,H/2+12);
  ctx.fillStyle='#d4a0b8';ctx.font='italic 11px Georgia';
  ctx.fillText('The paths breathe with sound once more. 🌸',W/2,H/2+34);
}

// ═══════════════ MOVEMENT ═══════════════
function movePlayer(){
  const spd=PL.spd;let mx=0,my=0;
  if(keys['ArrowLeft']||keys['a']||keys['A'])mx-=spd;
  if(keys['ArrowRight']||keys['d']||keys['D'])mx+=spd;
  if(keys['ArrowUp']||keys['w']||keys['W'])my-=spd;
  if(keys['ArrowDown']||keys['s']||keys['S'])my+=spd;
  PL.moving=mx!==0||my!==0;
  if(PL.moving){PL.x=Math.max(16,Math.min(W-16,PL.x+mx));PL.y=Math.max(H*0.26,Math.min(H-24,PL.y+my));}
}

// ═══════════════ GAME LOOP ═══════════════
function loop(ts){
  if(!G.lastT)G.lastT=ts;
  G.dt=Math.min((ts-G.lastT)/1000,0.05);G.lastT=ts;G.t+=G.dt;
  G.dayT+=G.dt*0.8;
  G.noticeTimer=Math.max(0,G.noticeTimer-G.dt);
  if(G.memoryTimer>0)G.memoryTimer-=G.dt;
  if(G.shadowBloomActive){G.shadowBloomTimer-=G.dt;if(G.shadowBloomTimer<=0){G.shadowBloomActive=false;}}

  // Draw everything
  drawSky();
  drawWorld();
  trees.forEach(t=>drawTree(t.x,t.y,t.sc,t.phase));
  drawPonds();
  drawWind();
  drawWindStones();
  drawMemFragments();
  drawMarkers();
  updatePetals();drawPetals();
  updateWind();
  drawPlayer();
  drawShadowOverlay();
  if(!G.showTutorial) movePlayer();
  drawPops();
  drawHUD();
  drawNotice(); drawToast();
  drawCombineUI();
  drawMemoryScene();
  if(G.won)drawWin();
  if(G.showTutorial)drawTutorial();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ── Tutorial dismiss ──────────────────────────────────────
canvas.addEventListener('click',function(e){
  if(!G.showTutorial)return;
  const rect=canvas.getBoundingClientRect();
  const scaleX=W/rect.width, scaleY=H/rect.height;
  const cx=(e.clientX-rect.left)*scaleX;
  const cy=(e.clientY-rect.top)*scaleY;
  // Check if click is on the button
  const btnX=W/2-80, btnW=160;
  const btnY=G._tutorialBtnY||0, btnH=G._tutorialBtnH||36;
  if(cx>=btnX&&cx<=btnX+btnW&&cy>=btnY&&cy<=btnY+btnH){
    if(G.tutorialPage===0){ G.tutorialPage=1; }
    else { G.showTutorial=false; }
  }
});
document.addEventListener('keydown',function(e){
  if(!G.showTutorial)return;
  if(e.key==='Enter'||e.key===' '){
    if(G.tutorialPage===0){ G.tutorialPage=1; }
    else { G.showTutorial=false; }
    e.preventDefault();
  }
});
</script>
